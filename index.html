<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio APK Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">Ethio<span>APK</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="#apps">Apps</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero">
        <div class="container hero-content">
            <h1>Ethio APK Hub</h1>
            <p>Verified Android apps for Ethiopia.</p>
            <div class="hero-search">
                <input type="text" id="search" placeholder="Search apps...">
                <i class="fa fa-search"></i>
            </div>
        </div>
    </header>

    <main class="container" id="apps">
        <div class="section-title"><h2>Trending Applications</h2></div>
        <div id="app-container" class="grid-container"></div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 Ethio APK Hub</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('app-container');
            fetch('apps.json')
                .then(res => res.json())
                .then(apps => {
                    apps.forEach(app => {
                        const slug = encodeURIComponent(app.name);
                        container.innerHTML += `
                            <div class="card">
                                <span class="badge-new">NEW</span>
                                <a href="download.html?name=${slug}" style="text-decoration:none; color:inherit;">
                                    <div class="card-icon-wrapper">
                                        <img src="${app.icon_url}" class="app-icon">
                                    </div>
                                    <h3 class="app-name">${app.name}</h3>
                                    <div class="card-meta">
                                        <span><i class="fa fa-star" style="color:#ffc107"></i> 4.8</span>
                                        <span>${app.size || '24MB'}</span>
                                    </div>
                                    <span class="btn-dl">Details</span>
                                </a>
                            </div>
                        `;
                    });
                });
        });
    </script>
</body>
</html>
