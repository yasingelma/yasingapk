<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio APK Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="body">

    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo-area" onclick="window.location.href='index.html'">
                <img src="https://yasing.com.et/EthioApk%20icon.jpg" alt="Logo" class="site-logo">
                <div class="logo">Ethio<span>APK</span></div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li class="dropdown">
                    <a href="javascript:void(0)" class="dropbtn">Categories <i class="fa fa-caret-down"></i></a>
                    <div class="dropdown-content">
                        <a href="#">Games</a>
                        <a href="#">Finance</a>
                        <a href="#">Social</a>
                        <a href="#">Tools</a>
                    </div>
                </li>
                <li><a href="#footer">Contact</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero">
        <div class="container hero-content">
            <h1>Safe & Fast APKs</h1>
            <div class="hero-search">
                <input type="text" id="search" placeholder="Search apps...">
                <i class="fa fa-search"></i>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="ad-banner">
            <p>ADVERTISEMENT</p>
            <div class="ad-placeholder">Your Ad Here</div>
        </div>

        <div class="section-title"><h2>Trending Applications</h2></div>
        <div id="app-container" class="grid-container"></div>
    </main>

    <footer class="main-footer" id="footer">
        <div class="container footer-grid">
            <div class="footer-col">
                <h4>Ethio APK Hub</h4>
                <p>Localized Android content for Ethiopia.</p>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-telegram"></i></a>
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-youtube"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom"><p>&copy; 2026 Ethio APK Hub</p></div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
